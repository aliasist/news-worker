name = "aliasist-news"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace for caching news
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "3e0258e348dd40869e1a1004510c281f"

[vars]
ALLOWED_ORIGIN = "https://aliasist.com"

# Scheduled trigger — refresh news every 30 minutes
[triggers]
crons = ["*/30 * * * *"]
