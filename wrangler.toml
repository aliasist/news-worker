name = "aliasist-news"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV namespace for caching news
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "3e0258e348dd40869e1a1004510c281f"

[vars]
ALLOWED_ORIGIN = "https://aliasist.com"

# Auto-refresh every 30 minutes
[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "ANALYTICS"
database_name = "aliasist-analytics"
database_id = "76035036-4ee2-45ba-865d-ab2c18089cfc"
